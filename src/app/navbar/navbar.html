<nav class="navbar fixed-top navbar-expand-lg navbar-dark text-uppercase" [class.navbar-scrolled]="useSolidNavbar">
  <div class="container-fluid px-4 px-lg-5">
    <a class="navbar-brand" routerLink="/">
      <div class="d-flex align-items-center gap-3">
        <div class="border rounded-circle d-flex align-items-center justify-content-center">EM</div>
        <span class="small text-uppercase">Marchetti</span>
      </div>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav mx-lg-auto mb-2 mb-lg-0 gap-lg-3 gap-xl-4">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            (click)="reloadIfCurrentPage($event, '/')" ariaCurrentWhenActive="page">
            Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/portfolio" routerLinkActive="active" [class.active]="isPortfolioSection"
            [attr.aria-current]="isPortfolioSection ? 'page' : null" (click)="reloadIfCurrentPage($event, '/portfolio')">
            Portfolio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active" ariaCurrentWhenActive="page"
            (click)="reloadIfCurrentPage($event, '/about')">
            About
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contact" routerLinkActive="active" ariaCurrentWhenActive="page"
            (click)="reloadIfCurrentPage($event, '/contact')">
            Contact
          </a>
        </li>
      </ul>
      <a class="btn btn-outline-light ms-lg-4" routerLink="/contact" [queryParams]="{ mode: 'booking' }">Book Now</a>
    </div>
  </div>
</nav>
