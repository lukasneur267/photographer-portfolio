@if (image) {
  <div class="container">
    <div class="row my-5">
      <div class="col">
        <img
          [src]="'images/' + image.imageUrl"
          class="img-fluid"
          [alt]="image.title"
          class="img-fluid"
        />
      </div>
      <div class="col my-auto">
        <h1>{{ image.title }}</h1>
        <p><strong>Category:</strong> {{ image.category }}</p>
        <p>{{ image.description }}</p>
        <p><strong>Captured on:</strong> {{ image.date }}</p>
        <div class="monochrome-buttos">
          <a class="btn monochrome-btn my-3" routerLink="/portfolio">BACK TO PORTFOLIO</a>
        </div>
      </div>
    </div>
  </div>
} @else {
  <h2>no image found</h2>
}
